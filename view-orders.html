<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>View Orders - Gaumaatri</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f7f7f7;margin:0;padding:20px}
    .box{max-width:900px;margin:auto;background:#fff;border-radius:10px;padding:20px;box-shadow:0 4px 16px rgba(0,0,0,.08)}
    h1{margin-top:0}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px;border-bottom:1px solid #eee;text-align:left}
    .muted{color:#666;font-size:14px}
    .btn{padding:8px 12px;border:0;border-radius:6px;background:#222;color:#fff;cursor:pointer}
  </style>
</head>
<body>
  <div class="box">
    <h1>Orders Dashboard</h1>
    <p class="muted">Basic working dashboard restored.</p>
    <button class="btn" onclick="load()">Refresh</button>
    <table id="t">
      <thead><tr><th>Order ID</th><th>Status</th><th>Amount</th></tr></thead>
      <tbody><tr><td colspan="3">No local order data</td></tr></tbody>
    </table>
  </div>
  <script>
    function load(){
      const tb=document.querySelector('#t tbody');
      tb.innerHTML='<tr><td colspan="3">No local order data</td></tr>';
    }
    load();
  </script>
</body>
</html>
