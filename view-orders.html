<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coupon Orders Viewer - Gaumaatri</title>
  <meta name="api-base" content="auto">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold: #C9922A;
      --gold-light: #E8B84B;
      --gold-dark: #8B6914;
      --cream: #FDF8F0;
      --brown: #3D2B1F;
      --text-dark: #2C2C2C;
      --text-light: #666;
      --border: #E5DDD0;
      --success: #27AE60;
      --danger: #E74C3C;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, var(--cream) 0%, #f5ede4 100%);
      color: var(--text-dark);
      line-height: 1.6;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      background: linear-gradient(135deg, var(--brown) 0%, #5C4033 100%);
      color: white;
      padding: 25px;
      border-radius: 10px;
      margin-bottom: 30px;
      text-align: center;
    }

    header h1 {
      font-size: 2em;
      margin-bottom: 5px;
    }

    .filters {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }

    .filter-group {
      display: flex;
      gap: 10px;
    }

    select, input {
      flex: 1;
      padding: 10px;
      border: 2px solid var(--border);
      border-radius: 6px;
      font-size: 1em;
    }

    button {
      background: var(--gold);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    button:hover {
      background: var(--gold-dark);
      transform: translateY(-2px);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      border-left: 4px solid var(--gold);
      text-align: center;
    }

    .stat-value {
      font-size: 2em;
      font-weight: bold;
      color: var(--gold);
      margin: 10px 0;
    }

    .stat-label {
      color: var(--text-light);
      font-size: 0.9em;
    }

    .table-container {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: linear-gradient(135deg, var(--brown) 0%, #5C4033 100%);
      color: white;
    }

    th {
      padding: 15px;
      text-align: left;
      font-weight: 600;
    }

    td {
      padding: 15px;
      border-bottom: 1px solid var(--border);
    }

    tbody tr:hover {
      background: rgba(201, 146, 42, 0.05);
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.85em;
      font-weight: 600;
    }

    .badge-gold {
      background: rgba(201, 146, 42, 0.2);
      color: var(--gold-dark);
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-light);
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--text-light);
    }

    .search-box {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .search-box input {
      width: 100%;
      padding: 12px;
      border: 2px solid var(--border);
      border-radius: 6px;
      font-size: 1em;
    }

    .pagination {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
      align-items: center;
    }

    .pagination button {
      padding: 8px 12px;
      min-width: 40px;
    }

    .pagination button.active {
      background: var(--gold-dark);
    }

    .export-btn {
      background: var(--success);
      margin-left: 10px;
    }

    .export-btn:hover {
      background: #229954;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📊 Coupon Orders Viewer</h1>
      <p>Real-time coupon usage and order tracking</p>
    </header>

    <!-- Stats Overview -->
    <div class="stats-grid" id="statsGrid"></div>

    <!-- Search & Filter -->
    <div class="search-box">
      <input
        type="text"
        id="searchInput"
        placeholder="🔍 Search by coupon code, customer name, or email..."
      />
    </div>

    <div class="filters">
      <div class="filter-group">
        <select id="couponFilter">
          <option value="">All Coupons</option>
        </select>
      </div>
      <div class="filter-group">
        <input type="date" id="dateFilter" />
      </div>
      <button onclick="loadOrders()">🔄 Refresh</button>
      <button class="export-btn" onclick="exportToCSV()">📥 Export CSV</button>
    </div>

    <!-- Orders Table -->
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Order ID</th>
            <th>Coupon Code</th>
            <th>Customer Name</th>
            <th>Customer Email</th>
            <th>Original Amount</th>
            <th>Discount (25%)</th>
            <th>Final Amount</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="ordersBody">
          <tr>
            <td colspan="8" class="loading">Loading orders...</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div class="pagination" id="paginationContainer"></div>
  </div>

  <script>
    // Get API base URL - auto-detect based on current location
    let API_BASE = document.querySelector('meta[name="api-base"]')?.content || '';
    if (API_BASE === 'auto') {
      // Use current domain/port
      API_BASE = `${window.location.protocol}//${window.location.host}`;
    } else if (!API_BASE) {
      // Fallback to current domain
      API_BASE = `${window.location.protocol}//${window.location.host}`;
    }
    
    let allOrders = [];
    let filteredOrders = [];
    let currentPage = 1;
    const itemsPerPage = 15;

    // Load initial data
    window.addEventListener('load', () => {
      loadOrders();
      loadCouponFilter();
    });

    // Load all orders and stats
    async function loadOrders() {
      try {
        const response = await fetch(`${API_BASE}/api/admin/analytics`);
        const data = await response.json();

        if (!response.ok) throw new Error(data.message);

        // Display stats
        displayStats(data);

        // Get per-coupon details
        const couponsResponse = await fetch(`${API_BASE}/api/admin/coupons`);
        const couponsData = await couponsResponse.json();

        // Fetch all usage records (aggregate from all coupons)
        allOrders = [];
        for (const coupon of couponsData.coupons) {
          const statsResponse = await fetch(`${API_BASE}/api/admin/coupon-stats/${coupon.code}`);
          const stats = await statsResponse.json();
          
          if (stats.recentUsage && stats.recentUsage.length > 0) {
            allOrders.push(...stats.recentUsage.map(usage => ({
              ...usage,
              couponCode: coupon.code,
              discount: Math.round((usage.amount * 25) / 100)
            })));
          }
        }

        // Sort by date descending
        allOrders.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

        filteredOrders = [...allOrders];
        displayOrders();
      } catch (err) {
        console.error(err);
        document.getElementById('ordersBody').innerHTML = `
          <tr><td colspan="8" class="empty-state">Error loading orders: ${err.message}</td></tr>
        `;
      }
    }

    // Display stats
    function displayStats(data) {
      const statsHTML = `
        <div class="stat-card">
          <div class="stat-label">Total Orders</div>
          <div class="stat-value">${data.totalOrders || 0}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Discount</div>
          <div class="stat-value">₹${data.totalDiscountGiven || 0}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Revenue</div>
          <div class="stat-value">₹${data.totalRevenue || 0}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Active Coupons</div>
          <div class="stat-value">${data.activeCoupons || 0}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Conversion Rate</div>
          <div class="stat-value">${data.conversionRate || 0}%</div>
        </div>
      `;
      document.getElementById('statsGrid').innerHTML = statsHTML;
    }

    // Load coupon filter dropdown
    async function loadCouponFilter() {
      try {
        const response = await fetch(`${API_BASE}/api/admin/coupons`);
        const data = await response.json();

        const select = document.getElementById('couponFilter');
        data.coupons.forEach(coupon => {
          const option = document.createElement('option');
          option.value = coupon.code;
          option.textContent = `${coupon.code} (${coupon.used} orders)`;
          select.appendChild(option);
        });

        select.addEventListener('change', filterOrders);
      } catch (err) {
        console.error('Error loading coupons:', err);
      }
    }

    // Filter orders
    function filterOrders() {
      const couponFilter = document.getElementById('couponFilter').value;
      const dateFilter = document.getElementById('dateFilter').value;
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();

      filteredOrders = allOrders.filter(order => {
        const matchesCoupon = !couponFilter || order.couponCode === couponFilter;
        const matchesDate = !dateFilter || order.timestamp?.startsWith(dateFilter);
        const matchesSearch = !searchTerm || 
          order.couponCode?.toLowerCase().includes(searchTerm) ||
          order.customerName?.toLowerCase().includes(searchTerm) ||
          order.customerEmail?.toLowerCase().includes(searchTerm) ||
          order.orderId?.toLowerCase().includes(searchTerm);

        return matchesCoupon && matchesDate && matchesSearch;
      });

      currentPage = 1;
      displayOrders();
    }

    // Add event listeners for filters
    document.getElementById('dateFilter').addEventListener('change', filterOrders);
    document.getElementById('searchInput').addEventListener('input', filterOrders);

    // Display orders in table
    function displayOrders() {
      if (filteredOrders.length === 0) {
        document.getElementById('ordersBody').innerHTML = `
          <tr><td colspan="8" class="empty-state">No orders found</td></tr>
        `;
        document.getElementById('paginationContainer').innerHTML = '';
        return;
      }

      const start = (currentPage - 1) * itemsPerPage;
      const end = start + itemsPerPage;
      const pageOrders = filteredOrders.slice(start, end);

      let html = '';
      pageOrders.forEach(order => {
        const date = new Date(order.timestamp).toLocaleDateString('en-IN', {
          year: 'numeric',
          month: 'short',
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit'
        });

        html += `
          <tr>
            <td><strong>${order.orderId || 'N/A'}</strong></td>
            <td><span class="badge badge-gold">${order.couponCode}</span></td>
            <td>${order.customerName || 'N/A'}</td>
            <td>${order.customerEmail || 'N/A'}</td>
            <td>₹${order.amount || 0}</td>
            <td>₹${order.discount || 0}</td>
            <td><strong>₹${(order.amount || 0) - (order.discount || 0)}</strong></td>
            <td>${date}</td>
          </tr>
        `;
      });

      document.getElementById('ordersBody').innerHTML = html;

      // Pagination
      const totalPages = Math.ceil(filteredOrders.length / itemsPerPage);
      displayPagination(totalPages);
    }

    // Display pagination
    function displayPagination(totalPages) {
      let html = '';

      if (currentPage > 1) {
        html += `<button onclick="goToPage(1)">« First</button>`;
        html += `<button onclick="goToPage(${currentPage - 1})">‹ Prev</button>`;
      }

      const startPage = Math.max(1, currentPage - 2);
      const endPage = Math.min(totalPages, currentPage + 2);

      for (let i = startPage; i <= endPage; i++) {
        html += `<button ${i === currentPage ? 'class="active"' : ''} onclick="goToPage(${i})">${i}</button>`;
      }

      if (currentPage < totalPages) {
        html += `<button onclick="goToPage(${currentPage + 1})">Next ›</button>`;
        html += `<button onclick="goToPage(${totalPages})">Last »</button>`;
      }

      html += `<span style="margin-left: 20px; color: var(--text-light);">Page ${currentPage} of ${totalPages}</span>`;

      document.getElementById('paginationContainer').innerHTML = html;
    }

    // Go to page
    function goToPage(page) {
      currentPage = page;
      displayOrders();
    }

    // Export to CSV
    function exportToCSV() {
      if (filteredOrders.length === 0) {
        alert('No orders to export');
        return;
      }

      let csv = 'Order ID,Coupon Code,Customer Name,Email,Original Amount,Discount,Final Amount,Date\n';
      
      filteredOrders.forEach(order => {
        const date = new Date(order.timestamp).toISOString();
        csv += `"${order.orderId}","${order.couponCode}","${order.customerName}","${order.customerEmail}",${order.amount},${order.discount},${(order.amount - order.discount)},${date}\n`;
      });

      const blob = new Blob([csv], { type: 'text/csv' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `coupon-orders-${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
      window.URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
