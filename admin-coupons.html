<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Coupons - Gaumaatri</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f7f7f7;margin:0;padding:20px}
    .box{max-width:900px;margin:auto;background:#fff;border-radius:10px;padding:20px;box-shadow:0 4px 16px rgba(0,0,0,.08)}
    h1{margin-top:0}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    input{padding:10px;border:1px solid #ddd;border-radius:6px}
    .btn{padding:10px 14px;border:0;border-radius:6px;background:#222;color:#fff;cursor:pointer}
    ul{padding-left:18px}
  </style>
</head>
<body>
  <div class="box">
    <h1>Coupons Dashboard</h1>
    <div class="row">
      <input id="code" placeholder="Coupon code" />
      <input id="off" placeholder="% off" type="number" />
      <button class="btn" onclick="add()">Add Coupon</button>
    </div>
    <ul id="list"></ul>
  </div>
  <script>
    const KEY='gaumaatriCoupons';
    const defaults=[{code:'GAUMAATRI10',off:10},{code:'WELCOME10',off:10}];
    let data=JSON.parse(localStorage.getItem(KEY)||'null')||defaults;
    function save(){ localStorage.setItem(KEY, JSON.stringify(data)); }
    function render(){
      document.getElementById('list').innerHTML=data.map(c=>`<li><b>${c.code}</b> - ${c.off}%</li>`).join('');
    }
    function add(){
      const code=document.getElementById('code').value.trim().toUpperCase();
      const off=Number(document.getElementById('off').value);
      if(!code||!off)return alert('Enter valid coupon');
      const i=data.findIndex(x=>x.code===code);
      if(i>=0)data[i].off=off; else data.push({code,off});
      save(); render(); alert('Coupon saved');
    }
    save(); render();
  </script>
</body>
</html>
